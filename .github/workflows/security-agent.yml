name: Security Agent

on:
  schedule:
    # Run daily at midnight UTC
    - cron: '0 0 * * *'
  workflow_dispatch:
    # Allow manual triggering

permissions:
  contents: write
  pull-requests: write

jobs:
  npm-security-scan:
    name: Frontend (npm) Security Scan
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities_found: ${{ steps.audit.outputs.vulnerabilities_found }}
      vulnerability_report: ${{ steps.audit.outputs.vulnerability_report }}
      pr_url: ${{ steps.create-pr.outputs.pull-request-url }}
      packages_updated: ${{ steps.fix.outputs.packages_updated }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/financetrackerapp/package-lock.json

      - name: Install dependencies
        working-directory: frontend/financetrackerapp
        run: npm ci

      - name: Run npm audit
        id: audit
        working-directory: frontend/financetrackerapp
        continue-on-error: true
        run: |
          # Run audit and capture output
          set +e
          AUDIT_OUTPUT=$(npm audit --json 2>&1)
          AUDIT_EXIT_CODE=$?
          set -e

          # Parse vulnerability counts
          TOTAL_VULNS=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.total // 0')
          HIGH_VULNS=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.high // 0')
          CRITICAL_VULNS=$(echo "$AUDIT_OUTPUT" | jq -r '.metadata.vulnerabilities.critical // 0')

          echo "Total vulnerabilities: $TOTAL_VULNS"
          echo "High severity: $HIGH_VULNS"
          echo "Critical severity: $CRITICAL_VULNS"

          if [ "$TOTAL_VULNS" -gt 0 ]; then
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT

            # Create a summary report
            REPORT="## npm Vulnerabilities Found\n"
            REPORT+="- Total: $TOTAL_VULNS\n"
            REPORT+="- Critical: $CRITICAL_VULNS\n"
            REPORT+="- High: $HIGH_VULNS\n"

            # Get list of vulnerable packages
            VULN_PACKAGES=$(echo "$AUDIT_OUTPUT" | jq -r '.vulnerabilities | keys[]' 2>/dev/null || echo "")
            if [ -n "$VULN_PACKAGES" ]; then
              REPORT+="\n### Affected Packages:\n"
              for pkg in $VULN_PACKAGES; do
                REPORT+="- $pkg\n"
              done
            fi

            # Store report (escape for GitHub Actions)
            echo "vulnerability_report<<EOF" >> $GITHUB_OUTPUT
            echo -e "$REPORT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
            echo "vulnerability_report=No npm vulnerabilities found." >> $GITHUB_OUTPUT
          fi

      - name: Fix vulnerabilities
        id: fix
        if: steps.audit.outputs.vulnerabilities_found == 'true'
        working-directory: frontend/financetrackerapp
        run: |
          echo "Attempting to fix vulnerabilities..."

          # Capture state before fixes
          BEFORE_LOCKFILE=$(cat package-lock.json)

          # Run npm audit fix
          npm audit fix --force || true

          # Run npm update for remaining outdated packages
          npm update || true

          # Check if anything changed
          AFTER_LOCKFILE=$(cat package-lock.json)

          if [ "$BEFORE_LOCKFILE" != "$AFTER_LOCKFILE" ]; then
            echo "packages_updated=true" >> $GITHUB_OUTPUT
            echo "Packages were updated"
          else
            echo "packages_updated=false" >> $GITHUB_OUTPUT
            echo "No packages were updated"
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.fix.outputs.packages_updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'security: fix npm vulnerabilities'
          title: '[Security] Fix npm vulnerabilities'
          body: |
            ## Automated Security Fix

            This PR was automatically created by the Security Agent workflow.

            ### Changes
            - Ran `npm audit fix` to address known vulnerabilities
            - Updated outdated packages where possible

            ### Review Required
            Please review the changes and ensure all tests pass before merging.

            ---
            *Generated by Security Agent*
          branch: security/npm-fix-${{ github.run_id }}
          base: main
          delete-branch: true

  nuget-security-scan:
    name: Backend (NuGet) Security Scan
    runs-on: ubuntu-latest
    outputs:
      vulnerabilities_found: ${{ steps.scan.outputs.vulnerabilities_found }}
      vulnerability_report: ${{ steps.scan.outputs.vulnerability_report }}
      pr_url: ${{ steps.create-pr.outputs.pull-request-url }}
      packages_updated: ${{ steps.fix.outputs.packages_updated }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore dependencies
        run: dotnet restore

      - name: Scan for vulnerabilities
        id: scan
        continue-on-error: true
        run: |
          echo "Scanning for vulnerable packages..."

          # Run vulnerability check
          VULN_OUTPUT=$(dotnet list package --vulnerable --include-transitive 2>&1) || true

          # Check for outdated packages
          OUTDATED_OUTPUT=$(dotnet list package --outdated 2>&1) || true

          # Determine if vulnerabilities exist
          if echo "$VULN_OUTPUT" | grep -q "has the following vulnerable packages"; then
            echo "vulnerabilities_found=true" >> $GITHUB_OUTPUT

            # Create report
            REPORT="## NuGet Vulnerabilities Found\n\n"
            REPORT+="\`\`\`\n"
            REPORT+="$VULN_OUTPUT\n"
            REPORT+="\`\`\`\n"

            echo "vulnerability_report<<EOF" >> $GITHUB_OUTPUT
            echo -e "$REPORT" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT

            # Extract vulnerable package names for fixing
            VULN_PACKAGES=$(echo "$VULN_OUTPUT" | grep ">" | awk '{print $2}' | sort -u)
            echo "vuln_packages<<EOF" >> $GITHUB_OUTPUT
            echo "$VULN_PACKAGES" >> $GITHUB_OUTPUT
            echo "EOF" >> $GITHUB_OUTPUT
          else
            echo "vulnerabilities_found=false" >> $GITHUB_OUTPUT
            echo "vulnerability_report=No NuGet vulnerabilities found." >> $GITHUB_OUTPUT
          fi

      - name: Fix vulnerabilities
        id: fix
        if: steps.scan.outputs.vulnerabilities_found == 'true'
        run: |
          echo "Attempting to fix vulnerabilities..."

          PACKAGES_UPDATED=false

          # Find all .csproj files
          CSPROJ_FILES=$(find . -name "*.csproj" -type f)

          # Get vulnerable packages from scan step
          VULN_PACKAGES="${{ steps.scan.outputs.vuln_packages }}"

          for pkg in $VULN_PACKAGES; do
            if [ -n "$pkg" ]; then
              echo "Updating package: $pkg"

              for csproj in $CSPROJ_FILES; do
                # Check if package is referenced in this project
                if grep -q "$pkg" "$csproj"; then
                  echo "Updating $pkg in $csproj"
                  dotnet add "$csproj" package "$pkg" || true
                  PACKAGES_UPDATED=true
                fi
              done
            fi
          done

          if [ "$PACKAGES_UPDATED" = true ]; then
            echo "packages_updated=true" >> $GITHUB_OUTPUT
          else
            echo "packages_updated=false" >> $GITHUB_OUTPUT
          fi

      - name: Create Pull Request
        id: create-pr
        if: steps.fix.outputs.packages_updated == 'true'
        uses: peter-evans/create-pull-request@v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'security: fix NuGet vulnerabilities'
          title: '[Security] Fix NuGet vulnerabilities'
          body: |
            ## Automated Security Fix

            This PR was automatically created by the Security Agent workflow.

            ### Changes
            - Updated vulnerable NuGet packages to their latest versions

            ### Review Required
            Please review the changes and ensure all tests pass before merging.

            ---
            *Generated by Security Agent*
          branch: security/nuget-fix-${{ github.run_id }}
          base: main
          delete-branch: true

  send-notification:
    name: Send Email Notification
    runs-on: ubuntu-latest
    needs: [npm-security-scan, nuget-security-scan]
    if: always()

    steps:
      - name: Prepare email content
        id: email
        run: |
          # Build email body
          BODY="# Security Agent Report\n\n"
          BODY+="**Run Date:** $(date -u '+%Y-%m-%d %H:%M:%S UTC')\n"
          BODY+="**Repository:** ${{ github.repository }}\n\n"

          BODY+="---\n\n"

          # npm results
          BODY+="## Frontend (npm) Scan Results\n\n"
          if [ "${{ needs.npm-security-scan.outputs.vulnerabilities_found }}" == "true" ]; then
            BODY+="${{ needs.npm-security-scan.outputs.vulnerability_report }}\n\n"

            if [ -n "${{ needs.npm-security-scan.outputs.pr_url }}" ]; then
              BODY+="**Pull Request Created:** ${{ needs.npm-security-scan.outputs.pr_url }}\n\n"
            elif [ "${{ needs.npm-security-scan.outputs.packages_updated }}" == "true" ]; then
              BODY+="Packages were updated but PR creation may have failed.\n\n"
            else
              BODY+="⚠️ Vulnerabilities found but could not be automatically fixed.\n\n"
            fi
          else
            BODY+="✅ No vulnerabilities detected.\n\n"
          fi

          BODY+="---\n\n"

          # NuGet results
          BODY+="## Backend (NuGet) Scan Results\n\n"
          if [ "${{ needs.nuget-security-scan.outputs.vulnerabilities_found }}" == "true" ]; then
            BODY+="${{ needs.nuget-security-scan.outputs.vulnerability_report }}\n\n"

            if [ -n "${{ needs.nuget-security-scan.outputs.pr_url }}" ]; then
              BODY+="**Pull Request Created:** ${{ needs.nuget-security-scan.outputs.pr_url }}\n\n"
            elif [ "${{ needs.nuget-security-scan.outputs.packages_updated }}" == "true" ]; then
              BODY+="Packages were updated but PR creation may have failed.\n\n"
            else
              BODY+="⚠️ Vulnerabilities found but could not be automatically fixed.\n\n"
            fi
          else
            BODY+="✅ No vulnerabilities detected.\n\n"
          fi

          BODY+="---\n\n"
          BODY+="*This is an automated message from the Security Agent workflow.*\n"
          BODY+="[View Workflow Run](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})"

          # Determine subject line
          NPM_VULNS="${{ needs.npm-security-scan.outputs.vulnerabilities_found }}"
          NUGET_VULNS="${{ needs.nuget-security-scan.outputs.vulnerabilities_found }}"

          if [ "$NPM_VULNS" == "true" ] || [ "$NUGET_VULNS" == "true" ]; then
            SUBJECT="⚠️ [Security Alert] Vulnerabilities detected in ${{ github.repository }}"
          else
            SUBJECT="✅ [Security Report] No vulnerabilities in ${{ github.repository }}"
          fi

          echo "subject=$SUBJECT" >> $GITHUB_OUTPUT
          echo "body<<EOF" >> $GITHUB_OUTPUT
          echo -e "$BODY" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Send email notification
        uses: dawidd6/action-send-mail@v3
        with:
          server_address: smtp.gmail.com
          server_port: 587
          secure: true
          username: ${{ secrets.MAIL_USERNAME }}
          password: ${{ secrets.MAIL_PASSWORD }}
          subject: ${{ steps.email.outputs.subject }}
          to: ${{ secrets.ALERT_EMAIL }}
          from: Security Agent <${{ secrets.MAIL_USERNAME }}>
          body: ${{ steps.email.outputs.body }}
